<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buddhist Chanting</title>
    <meta
      name="description"
      content="Mobile-first Pali chanting booklet with on-demand English translations."
    />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Pali Chanting Booklet</p>
        <h1>Buddhist Chanting</h1>
        <p class="hero-copy">
          Full chanting chapters in Pali. Long press any line to open its English translation.
        </p>
      </header>

      <div class="toolbar">
        <label class="chapter-picker">
          <span>Chapter</span>
          <select id="chapter-select" aria-label="Select chapter"></select>
        </label>

        <div class="font-widget" aria-label="Font size controls">
          <button id="font-down" type="button" aria-label="Decrease font size">-</button>
          <span id="font-size-label">100%</span>
          <button id="font-up" type="button" aria-label="Increase font size">+</button>
        </div>
      </div>

      <main id="chapter-view" class="chapter-view" aria-live="polite">
        <div class="loading">Loading chants...</div>
      </main>
    </div>

    <aside id="translation-drawer" class="translation-drawer" aria-hidden="true">
      <div class="drawer-handle" aria-hidden="true"></div>
      <button id="drawer-close" class="drawer-close" type="button" aria-label="Close translation">
        Close
      </button>
      <p class="drawer-label">Translation</p>
      <p id="drawer-source" class="drawer-source"></p>
      <p id="drawer-translation" class="drawer-translation"></p>
    </aside>

    <div id="drawer-backdrop" class="drawer-backdrop" hidden></div>

    <template id="chapter-template">
      <article class="chapter">
        <div class="chapter-heading">
          <p class="chapter-id"></p>
          <h2 class="chapter-title"></h2>
          <p class="chapter-hint">Long press a line to open the English translation.</p>
        </div>
        <div class="chapter-content"></div>
        <nav class="chapter-nav">
          <button class="nav-button prev-button" type="button">Previous</button>
          <button class="nav-button next-button" type="button">Next</button>
        </nav>
      </article>
    </template>

    <template id="entry-template">
      <button class="entry" type="button">
        <span class="entry-text"></span>
      </button>
    </template>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
